<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Frog & Spinach Chaos Arena</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(45deg, #87ceeb, #98fb98, #f0e68c);
            font-family: 'Comic Neue', cursive;
            overflow: hidden;
            user-select: none;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            cursor: crosshair;
        }

        .hud {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .player-info {
            background: rgba(255,255,255,0.8);
            padding: 10px;
            border-radius: 15px;
            border: 3px solid #000;
            transform: rotate(-2deg);
        }

        .player-info.right {
            transform: rotate(2deg);
        }

        .health-bar {
            width: 200px;
            height: 20px;
            background: #ff6b6b;
            border: 2px solid #000;
            border-radius: 10px;
            margin: 5px 0;
            overflow: hidden;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #45b7aa);
            transition: width 0.5s ease;
            border-radius: 8px;
        }

        .instability-bar {
            width: 200px;
            height: 15px;
            background: #ddd;
            border: 2px solid #000;
            border-radius: 8px;
            margin: 5px 0;
            overflow: hidden;
        }

        .instability-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff9ff3, #f368e0);
            transition: width 0.3s ease;
            border-radius: 6px;
        }

        .instructions {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.9);
            padding: 10px 20px;
            border-radius: 20px;
            border: 3px solid #000;
            text-align: center;
            font-weight: bold;
            z-index: 100;
        }

        .power-meter {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 200px;
            background: rgba(255,255,255,0.8);
            border: 3px solid #000;
            border-radius: 10px;
            display: none;
            z-index: 50;
        }

        .power-fill {
            width: 100%;
            background: linear-gradient(to top, #ff6b6b, #feca57, #48dbfb);
            border-radius: 7px;
            transition: height 0.1s ease;
        }

        .projectile {
            position: absolute;
            transition: none;
            z-index: 40;
        }

        .splat {
            position: absolute;
            pointer-events: none;
            z-index: 30;
        }

        .character {
            position: absolute;
            transition: all 0.1s ease;
            z-index: 20;
        }

        .shake-1 { animation: shake1 0.1s infinite; }
        .shake-2 { animation: shake2 0.1s infinite; }
        .shake-3 { animation: shake3 0.1s infinite; }
        .shake-4 { animation: shake4 0.1s infinite; }
        .shake-5 { animation: shake5 0.1s infinite; }

        @keyframes shake1 {
            0%, 100% { transform: translate(0px, 0px) rotate(0deg); }
            25% { transform: translate(1px, 1px) rotate(0.5deg); }
            50% { transform: translate(-1px, 1px) rotate(-0.5deg); }
            75% { transform: translate(1px, -1px) rotate(0.5deg); }
        }

        @keyframes shake2 {
            0%, 100% { transform: translate(0px, 0px) rotate(0deg); }
            25% { transform: translate(2px, 1px) rotate(1deg); }
            50% { transform: translate(-2px, 2px) rotate(-1deg); }
            75% { transform: translate(2px, -2px) rotate(1deg); }
        }

        @keyframes shake3 {
            0%, 100% { transform: translate(0px, 0px) rotate(0deg); }
            25% { transform: translate(3px, 2px) rotate(1.5deg); }
            50% { transform: translate(-3px, 3px) rotate(-1.5deg); }
            75% { transform: translate(3px, -3px) rotate(1.5deg); }
        }

        @keyframes shake4 {
            0%, 100% { transform: translate(0px, 0px) rotate(0deg); }
            25% { transform: translate(4px, 3px) rotate(2deg); }
            50% { transform: translate(-4px, 4px) rotate(-2deg); }
            75% { transform: translate(4px, -4px) rotate(2deg); }
        }

        @keyframes shake5 {
            0%, 100% { transform: translate(0px, 0px) rotate(0deg); }
            25% { transform: translate(6px, 4px) rotate(3deg); }
            50% { transform: translate(-6px, 6px) rotate(-3deg); }
            75% { transform: translate(6px, -6px) rotate(3deg); }
        }

        .stunned {
            animation: stun 0.5s ease-in-out;
        }

        @keyframes stun {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.1) rotate(5deg); }
            50% { transform: scale(0.9) rotate(-5deg); }
            75% { transform: scale(1.1) rotate(5deg); }
        }

        .explosion {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff6b6b, #feca57);
            animation: explode 0.5s ease-out forwards;
            z-index: 35;
        }

        @keyframes explode {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.5) rotate(180deg); opacity: 0.8; }
            100% { transform: scale(3) rotate(360deg); opacity: 0; }
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 30px;
            border: 5px solid #000;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            z-index: 200;
            display: none;
        }

        .restart-btn {
            background: #4ecdc4;
            border: 3px solid #000;
            border-radius: 15px;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transform: rotate(-1deg);
        }

        .restart-btn:hover {
            background: #45b7aa;
            transform: rotate(1deg) scale(1.05);
        }

        .streak-display {
            background: rgba(255,255,255,0.85);
            padding: 8px 15px;
            border-radius: 15px;
            border: 3px solid #000;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            align-self: flex-start;
        }

        .streak-number {
            font-size: 28px;
            line-height: 1;
            color: #e74c3c;
        }

        .streak-best {
            font-size: 11px;
            color: #555;
        }

        .new-record-flash {
            animation: recordFlash 0.5s ease-in-out 4;
        }

        @keyframes recordFlash {
            0%, 100% { background: rgba(255,255,255,0.95); }
            50% { background: rgba(255, 215, 0, 0.97); border-color: #f39c12; }
        }

        .health-fill.critical {
            animation: criticalPulse 0.5s ease-in-out infinite;
        }

        @keyframes criticalPulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.7) saturate(1.8); }
        }

        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.04) 2px,
                rgba(0, 0, 0, 0.04) 4px
            );
            border-radius: 0;
            box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.25);
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="hud">
            <div class="player-info">
                <div>YOU</div>
                <div class="health-bar">
                    <div class="health-fill" id="playerHealth" style="width: 100%"></div>
                </div>
                <div>Stench: <span id="playerStench">0</span></div>
                <div class="instability-bar">
                    <div class="instability-fill" id="playerInstability" style="width: 0%"></div>
                </div>
            </div>
            <div class="streak-display">
                <div>STREAK</div>
                <div class="streak-number" id="currentStreak">0</div>
                <div class="streak-best">BEST: <span id="bestStreak">0</span></div>
                <div class="streak-best" id="difficultyLevel">ENEMY LVL 1</div>
            </div>
            <div class="player-info right">
                <div>COMPUTER</div>
                <div class="health-bar">
                    <div class="health-fill" id="aiHealth" style="width: 100%"></div>
                </div>
                <div>Stench: <span id="aiStench">0</span></div>
                <div class="instability-bar">
                    <div class="instability-fill" id="aiInstability" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas" width="1200" height="800"></canvas>

        <div class="power-meter" id="powerMeter">
            <div class="power-fill" id="powerFill"></div>
        </div>

        <div class="instructions">
            Hold 'F' + Click to throw frogs (stuns opponent) | Click to throw spinach (damages) | WASD to move
        </div>

        <div class="game-over" id="gameOver">
            <div id="gameOverText">Game Over!</div>
            <div id="streakInfo" style="margin: 12px 0; font-size: 17px;"></div>
            <button class="restart-btn" onclick="restartGame()">Play Again!</button>
        </div>
    </div>

    <script>
        class SoundManager {
            constructor() {
                this.sounds = {};
                this.context = null;
                this.initAudio();
            }

            initAudio() {
                try {
                    this.context = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    console.log('Audio context not supported');
                }
            }

            createSound(frequency, duration, type = 'sine', volume = 0.1) {
                if (!this.context) return;
                
                const oscillator = this.context.createOscillator();
                const gainNode = this.context.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(this.context.destination);
                
                oscillator.frequency.setValueAtTime(frequency, this.context.currentTime);
                oscillator.type = type;
                
                gainNode.gain.setValueAtTime(volume, this.context.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.context.currentTime + duration);
                
                oscillator.start(this.context.currentTime);
                oscillator.stop(this.context.currentTime + duration);
            }

            playFrogCroak() {
                this.createSound(150 + Math.random() * 100, 0.3, 'sawtooth', 0.15);
                setTimeout(() => this.createSound(200 + Math.random() * 50, 0.2, 'square', 0.1), 100);
            }

            playSpinachSplat() {
                this.createSound(80 + Math.random() * 40, 0.5, 'sawtooth', 0.2);
                this.createSound(120 + Math.random() * 60, 0.3, 'square', 0.15);
            }

            playHurl() {
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        this.createSound(100 + Math.random() * 200, 0.4, 'sawtooth', 0.1);
                    }, i * 150);
                }
            }

            playExplosion() {
                this.createSound(60, 0.6, 'sawtooth', 0.3);
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        this.createSound(40 + Math.random() * 100, 0.2, 'square', 0.2);
                    }, i * 50);
                }
            }

            playStun() {
                this.createSound(400, 0.1, 'sine', 0.15);
                setTimeout(() => this.createSound(300, 0.2, 'triangle', 0.1), 100);
            }

            playMove() {
                if (Math.random() < 0.1) {
                    this.createSound(200 + Math.random() * 100, 0.1, 'triangle', 0.05);
                }
            }

            playHeartbeat() {
                this.createSound(62, 0.16, 'sine', 0.20);
                setTimeout(() => this.createSound(56, 0.12, 'sine', 0.15), 100);
            }

            playVictoryFanfare() {
                // Simple ascending chord: C E G C
                [261, 329, 392, 523].forEach((freq, i) => {
                    setTimeout(() => this.createSound(freq, 0.35, 'square', 0.11), i * 160);
                });
            }

            playRecordBreaker() {
                // Triumphant ascending run + high flourish
                [261, 329, 392, 523, 659, 784, 1046].forEach((freq, i) => {
                    setTimeout(() => {
                        this.createSound(freq, 0.38, 'square', 0.12);
                        if (i % 2 === 0) this.createSound(freq * 1.5, 0.18, 'triangle', 0.05);
                    }, i * 120);
                });
            }

            playComboSound(level) {
                // Ascending pitches as combo grows; harmonics kick in at x4+
                const notes = [330, 392, 440, 494, 523, 587, 659, 784];
                const idx = Math.min(level - 2, notes.length - 1);
                const freq = notes[idx];
                this.createSound(freq, 0.22, 'square', 0.14);
                if (level >= 4) {
                    setTimeout(() => this.createSound(freq * 2, 0.14, 'triangle', 0.07), 70);
                }
            }
        }

        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.sounds = new SoundManager();

                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;

                this.winStreak = parseInt(localStorage.getItem('winStreak') || '0');
                this.bestStreak = parseInt(localStorage.getItem('bestStreak') || '0');

                this.keys = {};
                this.mouse = { x: 0, y: 0, down: false };
                this.fKeyPressed = false;
                this.charging = false;
                this.power = 0;
                
                this.player = {
                    x: 100,
                    y: this.canvas.height / 2,
                    width: 60,
                    height: 80,
                    health: 100,
                    stench: 0,
                    instability: 0,
                    stunned: false,
                    speed: 3,
                    hitFlash: 0
                };

                this.ai = {
                    x: this.canvas.width - 100,
                    y: this.canvas.height / 2,
                    width: 60,
                    height: 80,
                    health: 100,
                    stench: 0,
                    instability: 0,
                    stunned: false,
                    speed: 2,
                    nextAction: 0,
                    target: { x: 0, y: 0 },
                    confused: false,
                    hitFlash: 0
                };

                this.projectiles = [];
                this.splats = [];
                this.particles = [];
                this.screenShake = { x: 0, y: 0, intensity: 0, duration: 0 };
                this.floatingNumbers = [];
                this.gameRunning = true;
                this.hitStopFrames = 0;
                this.playerHurtFrames = 0;
                this.playerCombo = 0;
                this.bestCombo = 0;
                this.lowHealthPulse = 0;

                this.initEventListeners();
                this.updateStreakDisplay();
                this.gameLoop();
            }

            initEventListeners() {
                document.addEventListener('keydown', (e) => {
                    this.keys[e.key.toLowerCase()] = true;
                    if (e.key.toLowerCase() === 'f') {
                        this.fKeyPressed = true;
                    }
                });

                document.addEventListener('keyup', (e) => {
                    this.keys[e.key.toLowerCase()] = false;
                    if (e.key.toLowerCase() === 'f') {
                        this.fKeyPressed = false;
                    }
                });

                this.canvas.addEventListener('mousedown', (e) => {
                    if (!this.gameRunning || this.player.stunned) return;
                    
                    this.mouse.down = true;
                    this.charging = true;
                    this.power = 0;
                    document.getElementById('powerMeter').style.display = 'block';
                    
                    const rect = this.canvas.getBoundingClientRect();
                    this.mouse.x = e.clientX - rect.left;
                    this.mouse.y = e.clientY - rect.top;
                });

                this.canvas.addEventListener('mouseup', (e) => {
                    if (!this.charging) return;
                    
                    this.mouse.down = false;
                    this.charging = false;
                    document.getElementById('powerMeter').style.display = 'none';
                    
                    const rect = this.canvas.getBoundingClientRect();
                    const targetX = e.clientX - rect.left;
                    const targetY = e.clientY - rect.top;
                    
                    if (this.fKeyPressed) {
                        this.throwFrog(targetX, targetY);
                    } else {
                        this.throwSpinach(targetX, targetY);
                    }
                });

                this.canvas.addEventListener('mousemove', (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    this.mouse.x = e.clientX - rect.left;
                    this.mouse.y = e.clientY - rect.top;
                });

                window.addEventListener('resize', () => {
                    this.canvas.width = window.innerWidth;
                    this.canvas.height = window.innerHeight;
                });
            }

            updatePlayer() {
                if (this.player.stunned) return;

                const instabilityFactor = 1 + (this.player.instability / 100) * 2;
                let moveX = 0, moveY = 0;

                if (this.keys['a']) moveX = -this.player.speed;
                if (this.keys['d']) moveX = this.player.speed;
                if (this.keys['w']) moveY = -this.player.speed;
                if (this.keys['s']) moveY = this.player.speed;

                // Apply instability to movement
                if (this.player.instability > 0) {
                    moveX += (Math.random() - 0.5) * instabilityFactor;
                    moveY += (Math.random() - 0.5) * instabilityFactor;
                }

                this.player.x = Math.max(0, Math.min(this.canvas.width - this.player.width, this.player.x + moveX));
                this.player.y = Math.max(0, Math.min(this.canvas.height - this.player.height, this.player.y + moveY));

                if (moveX || moveY) {
                    this.sounds.playMove();
                }

                if (this.charging) {
                    this.power = Math.min(100, this.power + 2);
                    document.getElementById('powerFill').style.height = this.power + '%';
                }
            }

            getDifficultyScale() {
                // 0.0 at streak 0, 1.0 at streak 8+
                return Math.min(this.winStreak / 8, 1);
            }

            updateAI() {
                if (this.ai.stunned || this.ai.confused) return;

                this.ai.nextAction++;

                const diff = this.getDifficultyScale();
                // AI speed scales from 2 (easy) to 4 (max difficulty)
                const aiSpeed = 2 + diff * 2;
                const instabilityFactor = 1 + (this.ai.instability / 100) * 3;
                let moveX = 0, moveY = 0;

                const distanceToPlayer = Math.sqrt((this.player.x - this.ai.x) ** 2 + (this.player.y - this.ai.y) ** 2);

                if (distanceToPlayer < 200) {
                    moveX = this.ai.x > this.player.x ? aiSpeed : -aiSpeed;
                } else if (distanceToPlayer > 400) {
                    moveX = this.ai.x < this.player.x ? aiSpeed : -aiSpeed;
                }

                // Higher difficulty: actively track player Y; lower difficulty: random vertical drift
                if (diff >= 0.5) {
                    const yDiff = this.player.y - this.ai.y;
                    if (Math.abs(yDiff) > 30) moveY = Math.sign(yDiff) * aiSpeed * 0.6;
                } else if (Math.random() < 0.02) {
                    moveY = (Math.random() - 0.5) * aiSpeed * 2;
                }

                if (this.ai.instability > 0) {
                    moveX += (Math.random() - 0.5) * instabilityFactor;
                    moveY += (Math.random() - 0.5) * instabilityFactor;
                }

                this.ai.x = Math.max(0, Math.min(this.canvas.width - this.ai.width, this.ai.x + moveX));
                this.ai.y = Math.max(0, Math.min(this.canvas.height - this.ai.height, this.ai.y + moveY));

                // Attack interval shrinks from 60-120 frames (easy) down to 20-30 frames (max)
                const minInterval = Math.round(60 - diff * 40);
                const randRange = Math.round(60 - diff * 50);
                if (this.ai.nextAction > minInterval + Math.random() * Math.max(randRange, 10)) {
                    this.ai.nextAction = 0;
                    // Frog usage rises from 30% to 50% at max difficulty (frogs stun, more disruptive)
                    const frogChance = 0.3 + diff * 0.2;
                    if (Math.random() < frogChance) {
                        this.aiThrowFrog();
                    } else {
                        this.aiThrowSpinach();
                    }
                }
            }

            throwFrog(targetX, targetY) {
                const power = this.power / 100;
                const baseSpeed = 5 + power * 5;
                
                // Frog might jump out of hand backwards!
                if (Math.random() < 0.15) {
                    targetX = this.player.x - 100;
                    targetY = this.player.y + (Math.random() - 0.5) * 200;
                    this.sounds.playFrogCroak();
                }

                const dx = targetX - (this.player.x + this.player.width / 2);
                const dy = targetY - (this.player.y + this.player.height / 2);
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                const instabilityFactor = 1 + (this.player.instability / 100);
                const inaccuracy = (Math.random() - 0.5) * 100 * instabilityFactor;
                
                this.projectiles.push({
                    type: 'frog',
                    x: this.player.x + this.player.width / 2,
                    y: this.player.y + this.player.height / 2,
                    vx: (dx / distance * baseSpeed) + (Math.random() - 0.5) * 2 * instabilityFactor,
                    vy: (dy / distance * baseSpeed) + (Math.random() - 0.5) * 2 * instabilityFactor + inaccuracy * 0.01,
                    owner: 'player',
                    life: 0,
                    maxLife: 120,
                    trail: []
                });

                this.sounds.playFrogCroak();
                this.power = 0;
                
                // Track projectile
                if (window.gameAnalytics) {
                    window.gameAnalytics.trackProjectile('frog');
                }
            }

            throwSpinach(targetX, targetY) {
                const power = this.power / 100;
                const baseSpeed = 4 + power * 6;
                
                // Spinach might explode mid-air!
                const willExplode = Math.random() < 0.2;
                
                const dx = targetX - (this.player.x + this.player.width / 2);
                const dy = targetY - (this.player.y + this.player.height / 2);
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                const instabilityFactor = 1 + (this.player.instability / 100);
                const inaccuracy = (Math.random() - 0.5) * 150 * instabilityFactor;
                
                this.projectiles.push({
                    type: 'spinach',
                    x: this.player.x + this.player.width / 2,
                    y: this.player.y + this.player.height / 2,
                    vx: (dx / distance * baseSpeed) + (Math.random() - 0.5) * 3 * instabilityFactor,
                    vy: (dy / distance * baseSpeed) + (Math.random() - 0.5) * 3 * instabilityFactor + inaccuracy * 0.01,
                    owner: 'player',
                    life: 0,
                    maxLife: willExplode ? 30 + Math.random() * 40 : 200,
                    willExplode: willExplode,
                    trail: []
                });

                this.power = 0;
                
                // Track projectile
                if (window.gameAnalytics) {
                    window.gameAnalytics.trackProjectile('spinach');
                }
            }

            aiThrowFrog() {
                const instabilityFactor = 1 + (this.ai.instability / 100) * 2;
                // Accuracy improves up to 60% at max difficulty
                const inaccuracy = 100 * (1 - this.getDifficultyScale() * 0.6) * instabilityFactor;
                
                const targetX = this.player.x + this.player.width / 2 + (Math.random() - 0.5) * inaccuracy;
                const targetY = this.player.y + this.player.height / 2 + (Math.random() - 0.5) * inaccuracy;
                
                const dx = targetX - (this.ai.x + this.ai.width / 2);
                const dy = targetY - (this.ai.y + this.ai.height / 2);
                const distance = Math.sqrt(dx * dx + dy * dy);
                const speed = 5 + Math.random() * 3;
                
                this.projectiles.push({
                    type: 'frog',
                    x: this.ai.x + this.ai.width / 2,
                    y: this.ai.y + this.ai.height / 2,
                    vx: (dx / distance * speed) + (Math.random() - 0.5) * 2 * instabilityFactor,
                    vy: (dy / distance * speed) + (Math.random() - 0.5) * 2 * instabilityFactor,
                    owner: 'ai',
                    life: 0,
                    maxLife: 120,
                    trail: []
                });

                this.sounds.playFrogCroak();
            }

            aiThrowSpinach() {
                const instabilityFactor = 1 + (this.ai.instability / 100) * 2;
                // Accuracy improves up to 60% at max difficulty
                const inaccuracy = 120 * (1 - this.getDifficultyScale() * 0.6) * instabilityFactor;
                
                const targetX = this.player.x + this.player.width / 2 + (Math.random() - 0.5) * inaccuracy;
                const targetY = this.player.y + this.player.height / 2 + (Math.random() - 0.5) * inaccuracy;
                
                const dx = targetX - (this.ai.x + this.ai.width / 2);
                const dy = targetY - (this.ai.y + this.ai.height / 2);
                const distance = Math.sqrt(dx * dx + dy * dy);
                const speed = 4 + Math.random() * 4;
                
                const willExplode = Math.random() < 0.25;
                
                this.projectiles.push({
                    type: 'spinach',
                    x: this.ai.x + this.ai.width / 2,
                    y: this.ai.y + this.ai.height / 2,
                    vx: (dx / distance * speed) + (Math.random() - 0.5) * 3 * instabilityFactor,
                    vy: (dy / distance * speed) + (Math.random() - 0.5) * 3 * instabilityFactor,
                    owner: 'ai',
                    life: 0,
                    maxLife: willExplode ? 30 + Math.random() * 40 : 200,
                    willExplode: willExplode,
                    trail: []
                });
            }

            updateProjectiles() {
                for (let i = this.projectiles.length - 1; i >= 0; i--) {
                    const p = this.projectiles[i];
                    p.trail.push({ x: p.x, y: p.y });
                    if (p.trail.length > 6) p.trail.shift();
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life++;

                    // Gravity for spinach
                    if (p.type === 'spinach') {
                        p.vy += 0.2;
                    }

                    // Check for explosions
                    if (p.willExplode && p.life >= p.maxLife) {
                        this.createExplosion(p.x, p.y);
                        this.sounds.playExplosion();
                        this.projectiles.splice(i, 1);
                        continue;
                    }

                    // Check boundaries
                    if (p.x < 0 || p.x > this.canvas.width || p.y < 0 || p.y > this.canvas.height || p.life > p.maxLife) {
                        if (p.type === 'spinach' && p.y > this.canvas.height - 20) {
                            this.createSplat(p.x, p.y, 'spinach');
                            this.sounds.playSpinachSplat();
                        }
                        this.projectiles.splice(i, 1);
                        continue;
                    }

                    // Check collisions
                    this.checkProjectileCollision(p, i);
                }
            }

            checkProjectileCollision(projectile, index) {
                const target = projectile.owner === 'player' ? this.ai : this.player;
                
                if (projectile.x >= target.x && projectile.x <= target.x + target.width &&
                    projectile.y >= target.y && projectile.y <= target.y + target.height) {
                    
                    if (projectile.type === 'frog') {
                        // Frog stuns and increases instability
                        target.stunned = true;
                        target.instability = Math.min(100, target.instability + 15);
                        target.hitFlash = 8;
                        if (target === this.player) this.playerHurtFrames = Math.max(this.playerHurtFrames, 25);
                        this.hitStopFrames = Math.max(this.hitStopFrames, 3);
                        this.triggerScreenShake(4, 8);
                        this.spawnImpactParticles(projectile.x, projectile.y, 'frog');
                        this.spawnFloatingNumber(target.x + target.width / 2, target.y, 'STUNNED');

                        setTimeout(() => {
                            target.stunned = false;
                        }, 1000);

                        if (target === this.ai) {
                            this.ai.confused = true;
                            setTimeout(() => {
                                this.ai.confused = false;
                            }, 1500);
                        }

                        this.sounds.playStun();
                        this.updateInstabilityDisplay();
                        this.handleCombo(projectile.owner === 'player');

                        // Track hit
                        if (window.gameAnalytics) {
                            window.gameAnalytics.trackHit('frog', projectile.owner === 'player' ? 'ai' : 'player');
                        }

                    } else if (projectile.type === 'spinach') {
                        // Spinach damages
                        const dmg = 15 + Math.random() * 10;
                        target.health -= dmg;
                        target.stench += 1;
                        target.hitFlash = 10;
                        if (target === this.player) this.playerHurtFrames = Math.max(this.playerHurtFrames, 40);
                        this.hitStopFrames = Math.max(this.hitStopFrames, 5);

                        this.createSplat(projectile.x, projectile.y, 'spinach');
                        this.spawnImpactParticles(projectile.x, projectile.y, 'spinach');
                        this.sounds.playSpinachSplat();
                        this.sounds.playHurl();
                        this.spawnFloatingNumber(target.x + target.width / 2, target.y, dmg);
                        this.triggerScreenShake(projectile.owner === 'player' ? 8 : 5, 12);

                        this.updateHealthDisplay();
                        this.handleCombo(projectile.owner === 'player');

                        // Track hit
                        if (window.gameAnalytics) {
                            window.gameAnalytics.trackHit('spinach', projectile.owner === 'player' ? 'ai' : 'player');
                        }

                        if (target.health <= 0 || target.stench >= 10) {
                            this.endGame(target === this.player ? 'ai' : 'player');
                        }
                    }
                    
                    this.projectiles.splice(index, 1);
                }
            }

            createExplosion(x, y) {
                const explosion = document.createElement('div');
                explosion.className = 'explosion';
                explosion.style.left = (x - 30) + 'px';
                explosion.style.top = (y - 30) + 'px';
                document.body.appendChild(explosion);
                
                setTimeout(() => {
                    document.body.removeChild(explosion);
                }, 500);
            }

            createSplat(x, y, type) {
                const points = [];
                for (let i = 0; i < 12; i++) {
                    const angle = (i / 12) * Math.PI * 2;
                    const radius = 15 + Math.random() * 12;
                    points.push({ x: Math.cos(angle) * radius, y: Math.sin(angle) * radius });
                }
                this.splats.push({ x, y, type, life: 0, points });
            }

            spawnImpactParticles(x, y, type) {
                const isFrog = type === 'frog';
                const colors = isFrog
                    ? ['#90ee90', '#32cd32', '#7cfc00', '#adff2f']
                    : ['#006400', '#228b22', '#32cd32', '#ffd700'];
                const count = isFrog ? 8 : 12;
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 1.5 + Math.random() * 4.5;
                    this.particles.push({
                        x, y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 1.5,
                        life: 0,
                        maxLife: 22 + Math.random() * 18,
                        size: 2.5 + Math.random() * 3.5,
                        color: colors[Math.floor(Math.random() * colors.length)]
                    });
                }
            }

            triggerScreenShake(intensity, duration) {
                if (intensity > this.screenShake.intensity) {
                    this.screenShake.intensity = intensity;
                    this.screenShake.duration = duration;
                }
            }

            spawnFloatingNumber(x, y, value) {
                const v = typeof value === 'string' ? value : Math.round(value);
                this.floatingNumbers.push({ x, y, value: v, life: 0, maxLife: 60 });
            }

            handleCombo(playerScored) {
                if (playerScored) {
                    this.playerCombo++;
                    if (this.playerCombo > this.bestCombo) this.bestCombo = this.playerCombo;
                    if (this.playerCombo >= 2) {
                        this.spawnComboText(this.canvas.width / 2, this.canvas.height * 0.28, this.playerCombo);
                        this.sounds.playComboSound(this.playerCombo);
                    }
                } else {
                    this.playerCombo = 0;
                }
            }

            spawnComboText(x, y, level) {
                this.floatingNumbers.push({ x, y, value: `COMBO x${level}!`, life: 0, maxLife: 90, combo: level });
            }

            updateHealthDisplay() {
                const playerHealthFill = document.getElementById('playerHealth');
                playerHealthFill.style.width = Math.max(0, this.player.health) + '%';
                if (this.player.health < 30) {
                    playerHealthFill.classList.add('critical');
                } else {
                    playerHealthFill.classList.remove('critical');
                }
                document.getElementById('aiHealth').style.width = Math.max(0, this.ai.health) + '%';
                document.getElementById('playerStench').textContent = this.player.stench;
                document.getElementById('aiStench').textContent = this.ai.stench;
            }

            updateInstabilityDisplay() {
                document.getElementById('playerInstability').style.width = this.player.instability + '%';
                document.getElementById('aiInstability').style.width = this.ai.instability + '%';
            }

            updateStreakDisplay() {
                document.getElementById('currentStreak').textContent = this.winStreak;
                document.getElementById('bestStreak').textContent = this.bestStreak;
                const el = document.getElementById('currentStreak');
                el.style.color = this.winStreak >= 3 ? '#e74c3c' : this.winStreak >= 1 ? '#e67e22' : '#aaa';
                const diffEl = document.getElementById('difficultyLevel');
                if (diffEl) diffEl.textContent = `ENEMY LVL ${this.winStreak + 1}`;
            }

            drawCharacter(character, isPlayer) {
                this.ctx.save();
                
                // Apply instability shaking
                const shakeLevel = Math.min(5, Math.floor(character.instability / 20) + 1);
                if (character.instability > 0) {
                    const shakeX = (Math.random() - 0.5) * shakeLevel;
                    const shakeY = (Math.random() - 0.5) * shakeLevel;
                    this.ctx.translate(shakeX, shakeY);
                }
                
                // Terrible toddler art
                this.ctx.strokeStyle = '#000';
                this.ctx.lineWidth = 3;
                this.ctx.lineCap = 'round';
                
                // Body - wobbly rectangle
                this.ctx.fillStyle = isPlayer ? '#ffb6c1' : '#87ceeb';
                this.ctx.beginPath();
                this.ctx.moveTo(character.x + 15, character.y + 30);
                this.ctx.lineTo(character.x + 45 + Math.sin(Date.now() * 0.01) * 3, character.y + 25);
                this.ctx.lineTo(character.x + 50, character.y + 60 + Math.cos(Date.now() * 0.012) * 2);
                this.ctx.lineTo(character.x + 10 + Math.sin(Date.now() * 0.008) * 2, character.y + 65);
                this.ctx.closePath();
                this.ctx.fill();
                this.ctx.stroke();
                
                // Head - wonky circle
                this.ctx.fillStyle = '#ffdbac';
                this.ctx.beginPath();
                this.ctx.ellipse(character.x + 30, character.y + 15, 15 + Math.sin(Date.now() * 0.02) * 2, 12, 0, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.stroke();
                
                // Eyes - crooked dots
                this.ctx.fillStyle = '#000';
                this.ctx.beginPath();
                this.ctx.ellipse(character.x + 25, character.y + 12, 2, 3, 0.2, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.beginPath();
                this.ctx.ellipse(character.x + 35, character.y + 10, 3, 2, -0.3, 0, Math.PI * 2);
                this.ctx.fill();
                
                // Mouth - squiggly line
                this.ctx.beginPath();
                this.ctx.moveTo(character.x + 27, character.y + 20);
                this.ctx.quadraticCurveTo(character.x + 30, character.y + 22 + Math.sin(Date.now() * 0.05) * 2, character.x + 33, character.y + 19);
                this.ctx.stroke();
                
                // Arms - wavy lines
                this.ctx.beginPath();
                this.ctx.moveTo(character.x + 15, character.y + 35);
                this.ctx.quadraticCurveTo(character.x + 5, character.y + 40, character.x + 8, character.y + 50);
                this.ctx.moveTo(character.x + 45, character.y + 35);
                this.ctx.quadraticCurveTo(character.x + 55, character.y + 40, character.x + 52, character.y + 50);
                this.ctx.stroke();
                
                // Legs - uneven sticks
                this.ctx.beginPath();
                this.ctx.moveTo(character.x + 20, character.y + 65);
                this.ctx.lineTo(character.x + 18, character.y + 80);
                this.ctx.moveTo(character.x + 40, character.y + 65);
                this.ctx.lineTo(character.x + 42, character.y + 80);
                this.ctx.stroke();

                // Stun stars — 3 golden stars orbiting above head when stunned
                if (character.stunned) {
                    const cx = character.x + character.width / 2;
                    const cy = character.y - 8;
                    const t = Date.now() * 0.004;
                    for (let s = 0; s < 3; s++) {
                        const angle = t + (s / 3) * Math.PI * 2;
                        const sx = cx + Math.cos(angle) * 22;
                        const sy = cy + Math.sin(angle) * 9;
                        this.ctx.save();
                        this.ctx.fillStyle = '#ffd700';
                        this.ctx.strokeStyle = '#000';
                        this.ctx.lineWidth = 1;
                        this.ctx.beginPath();
                        for (let pt = 0; pt < 10; pt++) {
                            const a = pt * Math.PI / 5 - Math.PI / 2;
                            const r = pt % 2 === 0 ? 6 : 3;
                            const px = sx + Math.cos(a) * r;
                            const py = sy + Math.sin(a) * r;
                            if (pt === 0) this.ctx.moveTo(px, py);
                            else this.ctx.lineTo(px, py);
                        }
                        this.ctx.closePath();
                        this.ctx.fill();
                        this.ctx.stroke();
                        this.ctx.restore();
                    }
                }

                // Stench fumes — wavy green lines above character, count and opacity scale with stench
                if (character.stench > 0) {
                    const stenchAlpha = 0.35 + (character.stench / 10) * 0.55;
                    const lineCount = 1 + Math.floor(character.stench / 3);
                    const t = Date.now() * 0.003;
                    this.ctx.lineWidth = 1.5;
                    for (let s = 0; s < lineCount; s++) {
                        this.ctx.strokeStyle = `rgba(80, 180, 60, ${stenchAlpha})`;
                        const bx = character.x + 8 + s * 14;
                        this.ctx.beginPath();
                        this.ctx.moveTo(bx + Math.sin(t + s) * 3, character.y - 4);
                        for (let seg = 1; seg <= 5; seg++) {
                            this.ctx.lineTo(
                                bx + Math.sin(t + s + seg * 0.7) * 4,
                                character.y - 4 - seg * 7
                            );
                        }
                        this.ctx.stroke();
                    }
                }

                // Hit flash overlay
                if (character.hitFlash > 0) {
                    this.ctx.globalAlpha = character.hitFlash / 10;
                    this.ctx.fillStyle = '#fff';
                    this.ctx.fillRect(character.x, character.y, character.width, character.height);
                    this.ctx.globalAlpha = 1;
                }

                this.ctx.restore();
            }

            drawProjectile(projectile) {
                this.ctx.save();

                // Motion trail
                const trailColor = projectile.type === 'frog' ? '#90ee90' : '#228B22';
                for (let i = 0; i < projectile.trail.length; i++) {
                    const t = projectile.trail[i];
                    const frac = i / projectile.trail.length;
                    this.ctx.globalAlpha = frac * 0.35;
                    this.ctx.fillStyle = trailColor;
                    this.ctx.beginPath();
                    this.ctx.arc(t.x, t.y, frac * 4, 0, Math.PI * 2);
                    this.ctx.fill();
                }
                this.ctx.globalAlpha = 1;

                if (projectile.type === 'frog') {
                    // Terrible frog drawing
                    this.ctx.fillStyle = '#90ee90';
                    this.ctx.strokeStyle = '#000';
                    this.ctx.lineWidth = 2;
                    
                    // Frog body - lopsided oval
                    this.ctx.beginPath();
                    this.ctx.ellipse(projectile.x, projectile.y, 8, 6, projectile.life * 0.2, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.stroke();
                    
                    // Eyes - bulging dots
                    this.ctx.fillStyle = '#fff';
                    this.ctx.beginPath();
                    this.ctx.ellipse(projectile.x - 3, projectile.y - 3, 3, 4, 0, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.beginPath();
                    this.ctx.ellipse(projectile.x + 3, projectile.y - 3, 3, 4, 0, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    this.ctx.fillStyle = '#000';
                    this.ctx.beginPath();
                    this.ctx.ellipse(projectile.x - 3, projectile.y - 3, 1, 2, 0, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.beginPath();
                    this.ctx.ellipse(projectile.x + 3, projectile.y - 3, 1, 2, 0, 0, Math.PI * 2);
                    this.ctx.fill();
                } else {
                    // Terrible spinach drawing
                    this.ctx.fillStyle = '#006400';
                    this.ctx.strokeStyle = '#000';
                    this.ctx.lineWidth = 2;
                    
                    // Spinach blob - irregular shape
                    this.ctx.beginPath();
                    this.ctx.moveTo(projectile.x, projectile.y);
                    for (let i = 0; i < 8; i++) {
                        const angle = (i / 8) * Math.PI * 2;
                        const radius = 6 + Math.sin(angle * 3 + projectile.life * 0.1) * 3;
                        const x = projectile.x + Math.cos(angle) * radius;
                        const y = projectile.y + Math.sin(angle) * radius;
                        if (i === 0) {
                            this.ctx.moveTo(x, y);
                        } else {
                            this.ctx.lineTo(x, y);
                        }
                    }
                    this.ctx.closePath();
                    this.ctx.fill();
                    this.ctx.stroke();
                    
                    // Steam lines
                    this.ctx.strokeStyle = '#ccc';
                    this.ctx.lineWidth = 1;
                    for (let i = 0; i < 3; i++) {
                        this.ctx.beginPath();
                        this.ctx.moveTo(projectile.x - 5 + i * 5, projectile.y - 10);
                        this.ctx.quadraticCurveTo(projectile.x - 3 + i * 5, projectile.y - 15, projectile.x - 1 + i * 5, projectile.y - 12);
                        this.ctx.stroke();
                    }
                }
                
                this.ctx.restore();
            }

            drawSplat(splat) {
                this.ctx.save();
                this.ctx.globalAlpha = Math.max(0, 1 - splat.life / 600);
                this.ctx.fillStyle = splat.type === 'spinach' ? '#006400' : '#8B4513';

                this.ctx.beginPath();
                splat.points.forEach((pt, i) => {
                    if (i === 0) this.ctx.moveTo(splat.x + pt.x, splat.y + pt.y);
                    else this.ctx.lineTo(splat.x + pt.x, splat.y + pt.y);
                });
                this.ctx.closePath();
                this.ctx.fill();

                this.ctx.restore();
            }

            update() {
                if (!this.gameRunning) return;
                
                this.updatePlayer();
                this.updateAI();
                this.updateProjectiles();
                
                // Update splats
                for (let i = this.splats.length - 1; i >= 0; i--) {
                    this.splats[i].life++;
                    if (this.splats[i].life > 600) {
                        this.splats.splice(i, 1);
                    }
                }

                // Update impact particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.18;
                    p.vx *= 0.96;
                    p.life++;
                    if (p.life >= p.maxLife) this.particles.splice(i, 1);
                }
                
                // Reduce instability over time
                this.player.instability = Math.max(0, this.player.instability - 0.1);
                this.ai.instability = Math.max(0, this.ai.instability - 0.1);
                this.updateInstabilityDisplay();

                // Decay screen shake
                if (this.screenShake.duration > 0) {
                    this.screenShake.x = (Math.random() - 0.5) * this.screenShake.intensity;
                    this.screenShake.y = (Math.random() - 0.5) * this.screenShake.intensity;
                    this.screenShake.duration--;
                    this.screenShake.intensity *= 0.85;
                } else {
                    this.screenShake.x = 0;
                    this.screenShake.y = 0;
                }

                // Update floating numbers
                for (let i = this.floatingNumbers.length - 1; i >= 0; i--) {
                    this.floatingNumbers[i].y -= this.floatingNumbers[i].combo ? 0.6 : 1.5;
                    this.floatingNumbers[i].life++;
                    if (this.floatingNumbers[i].life >= this.floatingNumbers[i].maxLife) {
                        this.floatingNumbers.splice(i, 1);
                    }
                }

                // Decay hit flash
                if (this.player.hitFlash > 0) this.player.hitFlash--;
                if (this.ai.hitFlash > 0) this.ai.hitFlash--;
                if (this.playerHurtFrames > 0) this.playerHurtFrames--;

                // Low-health heartbeat pulse — beats faster when critically low
                if (this.player.health > 0 && this.player.health < 30) {
                    const beatRate = this.player.health < 15 ? 28 : 48;
                    this.lowHealthPulse = (this.lowHealthPulse + 1) % beatRate;
                    if (this.lowHealthPulse === 0) this.sounds.playHeartbeat();
                } else {
                    this.lowHealthPulse = 0;
                }
            }

            draw() {
                // Clear canvas with terrible background
                this.ctx.fillStyle = '#87ceeb';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // Apply screen shake
                this.ctx.save();
                this.ctx.translate(this.screenShake.x, this.screenShake.y);
                
                // Terrible ground
                this.ctx.fillStyle = '#90ee90';
                this.ctx.strokeStyle = '#000';
                this.ctx.lineWidth = 3;
                this.ctx.beginPath();
                this.ctx.moveTo(0, this.canvas.height - 20);
                for (let x = 0; x <= this.canvas.width; x += 50) {
                    this.ctx.lineTo(x, this.canvas.height - 20 + Math.sin(x * 0.02) * 5);
                }
                this.ctx.lineTo(this.canvas.width, this.canvas.height);
                this.ctx.lineTo(0, this.canvas.height);
                this.ctx.closePath();
                this.ctx.fill();
                this.ctx.stroke();
                
                // Draw splats
                this.splats.forEach(splat => this.drawSplat(splat));

                // Draw impact particles
                this.particles.forEach(p => {
                    const alpha = 1 - p.life / p.maxLife;
                    this.ctx.save();
                    this.ctx.globalAlpha = alpha;
                    this.ctx.fillStyle = p.color;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size * (0.4 + alpha * 0.6), 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.restore();
                });

                // Draw characters
                this.drawCharacter(this.player, true);
                this.drawCharacter(this.ai, false);
                
                // Draw projectiles
                this.projectiles.forEach(projectile => this.drawProjectile(projectile));
                
                // Draw floating damage numbers
                this.floatingNumbers.forEach(n => {
                    const alpha = 1 - n.life / n.maxLife;
                    this.ctx.save();
                    this.ctx.globalAlpha = alpha;
                    this.ctx.textAlign = 'center';
                    this.ctx.strokeStyle = '#000';
                    if (n.combo) {
                        const comboColors = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#ff9f43'];
                        const bounce = 1.45 + Math.sin(n.life * 0.28) * 0.12;
                        this.ctx.font = `bold ${Math.round(32 * bounce)}px monospace`;
                        this.ctx.fillStyle = comboColors[(n.combo - 2) % comboColors.length];
                        this.ctx.lineWidth = 4;
                    } else {
                        const scale = 1 + (1 - n.life / n.maxLife) * 0.4;
                        this.ctx.font = `bold ${Math.round(20 * scale)}px monospace`;
                        this.ctx.fillStyle = typeof n.value === 'string' ? '#ffd700' : '#ff3333';
                        this.ctx.lineWidth = 3;
                    }
                    const text = typeof n.value === 'string' ? n.value : '-' + n.value;
                    this.ctx.strokeText(text, n.x, n.y);
                    this.ctx.fillText(text, n.x, n.y);
                    this.ctx.restore();
                });

                this.ctx.restore(); // end screen shake translate

                // Damage vignette — red edge pulse when the player takes a hit
                if (this.playerHurtFrames > 0) {
                    const alpha = (this.playerHurtFrames / 40) * 0.6;
                    const cx = this.canvas.width / 2, cy = this.canvas.height / 2;
                    const grad = this.ctx.createRadialGradient(cx, cy, this.canvas.height * 0.2, cx, cy, this.canvas.height * 0.9);
                    grad.addColorStop(0, 'rgba(200, 0, 0, 0)');
                    grad.addColorStop(1, `rgba(200, 0, 0, ${alpha})`);
                    this.ctx.fillStyle = grad;
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                }

                // Low-health heartbeat vignette (pulsing red border, layered under the hit vignette)
                if (this.player.health > 0 && this.player.health < 30) {
                    const beatRate = this.player.health < 15 ? 28 : 48;
                    const phase = this.lowHealthPulse / beatRate;
                    const alpha = Math.pow(Math.sin(phase * Math.PI), 2) * 0.30;
                    if (alpha > 0.004) {
                        const cx = this.canvas.width / 2, cy = this.canvas.height / 2;
                        const grad = this.ctx.createRadialGradient(cx, cy, this.canvas.height * 0.18, cx, cy, this.canvas.height * 0.88);
                        grad.addColorStop(0, 'rgba(180, 0, 0, 0)');
                        grad.addColorStop(1, `rgba(180, 0, 0, ${alpha})`);
                        this.ctx.fillStyle = grad;
                        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    }
                }

                // Persistent combo badge (below DOM HUD, above crosshair)
                if (this.playerCombo >= 2) {
                    const comboColors = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#ff9f43'];
                    const pulse = 1 + Math.sin(Date.now() * 0.012) * 0.06;
                    this.ctx.save();
                    this.ctx.textAlign = 'center';
                    this.ctx.font = `bold ${Math.round(17 * pulse)}px monospace`;
                    this.ctx.fillStyle = comboColors[(this.playerCombo - 2) % comboColors.length];
                    this.ctx.strokeStyle = '#000';
                    this.ctx.lineWidth = 3;
                    this.ctx.globalAlpha = 0.92;
                    const badge = `x${this.playerCombo} COMBO`;
                    this.ctx.strokeText(badge, this.canvas.width / 2, 108);
                    this.ctx.fillText(badge, this.canvas.width / 2, 108);
                    this.ctx.restore();
                }

                // Spinach trajectory arc preview while charging (gravity physics makes aiming non-trivial)
                if (this.charging && !this.fKeyPressed) {
                    const power = this.power / 100;
                    const baseSpeed = 4 + power * 6;
                    const startX = this.player.x + this.player.width / 2;
                    const startY = this.player.y + this.player.height / 2;
                    const dx = this.mouse.x - startX;
                    const dy = this.mouse.y - startY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 0) {
                        let px = startX, py = startY;
                        let pvx = (dx / dist) * baseSpeed;
                        let pvy = (dy / dist) * baseSpeed;
                        this.ctx.save();
                        this.ctx.fillStyle = '#55ee88';
                        this.ctx.strokeStyle = '#55ee88';
                        for (let step = 0; step < 140; step++) {
                            px += pvx;
                            py += pvy;
                            pvy += 0.2; // same gravity as real spinach
                            if (px < 0 || px > this.canvas.width || py > this.canvas.height) break;
                            if (step % 4 === 0) {
                                this.ctx.globalAlpha = Math.max(0.08, 0.65 - (step / 140) * 0.57);
                                const r = 2.5 + (step / 140) * 1.5;
                                this.ctx.beginPath();
                                this.ctx.arc(px, py, r, 0, Math.PI * 2);
                                this.ctx.fill();
                            }
                        }
                        this.ctx.restore();
                    }
                }

                // Draw crosshair (outside shake so it stays stable)
                if (!this.charging) {
                    this.ctx.strokeStyle = this.fKeyPressed ? '#ff6b6b' : '#4ecdc4';
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.moveTo(this.mouse.x - 10, this.mouse.y);
                    this.ctx.lineTo(this.mouse.x + 10, this.mouse.y);
                    this.ctx.moveTo(this.mouse.x, this.mouse.y - 10);
                    this.ctx.lineTo(this.mouse.x, this.mouse.y + 10);
                    this.ctx.stroke();
                }
            }

            endGame(winner) {
                this.gameRunning = false;
                const gameOverDiv = document.getElementById('gameOver');
                const gameOverText = document.getElementById('gameOverText');
                const streakInfo = document.getElementById('streakInfo');
                let isNewRecord = false;

                if (winner === 'player') {
                    this.winStreak++;
                    if (this.winStreak > this.bestStreak) {
                        this.bestStreak = this.winStreak;
                        localStorage.setItem('bestStreak', this.bestStreak);
                        isNewRecord = true;
                    }
                    localStorage.setItem('winStreak', this.winStreak);

                    gameOverText.innerHTML = '🎉 You Won! 🎉<br>The computer gave up from the stench!';
                    let streakMsg = `Win Streak: <strong>${this.winStreak}</strong>`;
                    if (isNewRecord && this.winStreak > 1) {
                        streakMsg += '<br><strong style="color:#e67e22;font-size:20px">★ NEW RECORD! ★</strong>';
                    }
                    if (this.bestCombo >= 2) {
                        streakMsg += `<br><span style="font-size:15px;color:#e67e22;">Best combo: <strong>x${this.bestCombo}</strong></span>`;
                    }
                    streakInfo.innerHTML = streakMsg;
                } else {
                    gameOverText.innerHTML = '💚 Computer Wins! 💚<br>You were overwhelmed by spinach!';
                    let lossMsg = this.winStreak > 0 ? `Streak ended at: <strong>${this.winStreak}</strong>` : '';
                    if (this.bestCombo >= 2) {
                        lossMsg += (lossMsg ? '<br>' : '') + `<span style="font-size:15px;color:#e67e22;">Best combo: <strong>x${this.bestCombo}</strong></span>`;
                    }
                    streakInfo.innerHTML = lossMsg;
                    this.winStreak = 0;
                    localStorage.setItem('winStreak', '0');
                }

                this.updateStreakDisplay();
                gameOverDiv.classList.remove('new-record-flash');
                gameOverDiv.style.display = 'block';

                if (isNewRecord && this.bestStreak > 1) {
                    void gameOverDiv.offsetWidth; // force reflow to restart animation
                    gameOverDiv.classList.add('new-record-flash');
                    this.sounds.playRecordBreaker();
                } else if (winner === 'player') {
                    this.sounds.playVictoryFanfare();
                } else {
                    this.sounds.playHurl();
                }

                if (window.gameAnalytics) {
                    window.gameAnalytics.trackGameEnd(winner);
                }
            }

            gameLoop() {
                if (this.hitStopFrames > 0) {
                    this.hitStopFrames--;
                } else {
                    this.update();
                }
                this.draw();
                if (this.gameRunning) {
                    requestAnimationFrame(() => this.gameLoop());
                }
            }
        }

        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            new Game();
        }

        // Start the game
        let game = new Game();

        // Enable audio context on first user interaction
        document.addEventListener('click', () => {
            if (game.sounds.context && game.sounds.context.state === 'suspended') {
                game.sounds.context.resume();
            }
        }, { once: true });

        // Simple analytics tracking
        (function() {
            // Track page load time
            if ('performance' in window) {
                window.addEventListener('load', function() {
                    var navigation = performance.getEntriesByType('navigation')[0];
                    if (navigation) {
                        console.log('📊 Page Load Time:', navigation.loadEventEnd - navigation.loadEventStart, 'ms');
                        console.log('📊 DOM Content Loaded:', navigation.domContentLoadedEventEnd - navigation.domContentLoadedEventStart, 'ms');
                    }
                });
            }
            
            console.log('✅ Analytics initialized');
        })();

        // Game analytics tracking
        window.gameAnalytics = {
            trackEvent: (name, data = {}) => {
                if (window.va) {
                    window.va('event', {
                        name,
                        data: {
                            ...data,
                            timestamp: Date.now()
                        }
                    });
                }
            },

            trackGameStart: () => {
                window.gameAnalytics.trackEvent('game_started');
            },

            trackGameEnd: (winner) => {
                window.gameAnalytics.trackEvent('game_ended', { winner });
            },

            trackProjectile: (type) => {
                window.gameAnalytics.trackEvent('projectile_thrown', { type });
            },

            trackHit: (type, target) => {
                window.gameAnalytics.trackEvent('projectile_hit', { type, target });
            }
        };

        // Initialize game analytics
        if (window.gameAnalytics) {
            window.gameAnalytics.trackGameStart();
        }
    </script>
